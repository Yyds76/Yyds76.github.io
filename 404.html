<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>代码存储库 - Yyds76</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: white;
            color: black;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            font-size: 18px;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #666;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
            margin-left: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .access-denied {
            text-align: center;
            margin-top: 100px;
            font-family: Arial, sans-serif;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            max-width: 500px;
            margin: 100px auto;
        }

        .access-denied h1 {
            color: #e53e3e;
            margin-bottom: 20px;
        }

        .access-denied p {
            color: #666;
            margin-bottom: 30px;
        }

        .access-denied button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        .raw-content {
            white-space: pre-wrap;
            font-family: 'Courier New', monospace;
            padding: 15px;
            margin: 0;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div id="loading" class="loading">正在验证访问权限</div>

    <script>
        // 配置信息
        const CONFIG = {
            password: 'SuperMiner',
            apiKey: 'yyds_steve_76',
            github: {
                username: 'Yyds76',
                repo: 'Yyds76.github.io',
                branch: 'main'
            }
        };

        // GitHub文件管理器
        class GitHubFileManager {
            constructor(username, repo, branch = 'main') {
                this.username = username;
                this.repo = repo;
                this.branch = branch;
                this.rawBaseUrl = `https://raw.githubusercontent.com/${username}/${repo}/${branch}`;
                this.apiBaseUrl = `https://api.github.com/repos/${username}/${repo}`;
            }

            async getFileList() {
                try {
                    const response = await fetch(`${this.apiBaseUrl}/contents?ref=${this.branch}`);
                    if (!response.ok) throw new Error('获取文件列表失败');
                    
                    const files = await response.json();
                    return files.filter(file => 
                        file.type === 'file' && 
                        (file.name.endsWith('.lua') || 
                         file.name.endsWith('.txt') || 
                         file.name.endsWith('.js') || 
                         file.name.endsWith('.py') ||
                         file.name.endsWith('.md'))
                    );
                } catch (error) {
                    console.error('获取文件列表错误:', error);
                    return [];
                }
            }

            async getFileContent(filename) {
                try {
                    const response = await fetch(`${this.rawBaseUrl}/${filename}`);
                    if (!response.ok) throw new Error('文件不存在');
                    return await response.text();
                } catch (error) {
                    console.error('获取文件内容错误:', error);
                    return null;
                }
            }

            generateSecureFileId(filename, index) {
                const combined = filename + index + 'yyds76';
                const hash = this.simpleHash(combined);
                return 'f' + hash.toString(16).substring(0, 7);
            }

            simpleHash(str) {
                let hash = 0;
                for (let i = 0; i < str.length; i++) {
                    const char = str.charCodeAt(i);
                    hash = ((hash << 5) - hash) + char;
                    hash = hash & hash;
                }
                return Math.abs(hash);
            }
        }

        const githubManager = new GitHubFileManager(
            CONFIG.github.username, 
            CONFIG.github.repo, 
            CONFIG.github.branch
        );

        // 显示访问拒绝页面
        function showAccessDenied() {
            document.body.innerHTML = `
                <div class="access-denied">
                    <h1>🔒 访问被拒绝</h1>
                    <p>您需要先登录才能访问此内容</p>
                    <p>会话可能已过期，请重新登录</p>
                    <button onclick="window.location.href='/'">返回登录页面</button>
                </div>
            `;
        }

        // 检查登录状态
        function checkAuth() {
            const isLoggedIn = sessionStorage.getItem('authenticated') === 'true';
            const loginTime = sessionStorage.getItem('loginTime');
            const currentTime = Date.now();
            
            if (!isLoggedIn || !loginTime || (currentTime - parseInt(loginTime)) > 30 * 60 * 1000) {
                return false;
            }
            return true;
        }

        // 处理Raw文件访问
        async function handleRawAccess() {
            // 检查登录状态
            if (!checkAuth()) {
                showAccessDenied();
                return;
            }

            // 从URL路径中提取文件ID
            const path = window.location.pathname;
            const pathParts = path.split('/');
            
            // 支持 /view/fileId 格式
            let fileId = null;
            if (pathParts.length >= 3 && pathParts[1] === 'view') {
                fileId = pathParts[2];
            }

            if (!fileId) {
                document.body.innerHTML = '<h1 style="text-align: center; margin-top: 100px;">404 - 无效的文件路径</h1>';
                return;
            }

            try {
                // 获取文件列表并建立映射
                const files = await githubManager.getFileList();
                let targetFilename = null;

                // 查找对应的文件
                files.forEach((file, index) => {
                    const secureId = githubManager.generateSecureFileId(file.name, index);
                    if (secureId === fileId) {
                        targetFilename = file.name;
                    }
                });

                if (!targetFilename) {
                    document.body.innerHTML = '<h1 style="text-align: center; margin-top: 100px;">404 - 文件未找到</h1>';
                    return;
                }

                // 获取文件内容
                const content = await githubManager.getFileContent(targetFilename);
                if (content) {
                    // 显示Raw内容
                    document.getElementById('loading').style.display = 'none';
                    document.body.innerHTML = '';
                    
                    const pre = document.createElement('pre');
                    pre.className = 'raw-content';
                    pre.textContent = content;
                    document.body.appendChild(pre);
                } else {
                    document.body.innerHTML = '<h1 style="text-align: center; margin-top: 100px;">500 - 无法加载文件内容</h1>';
                }

            } catch (error) {
                console.error('处理Raw访问错误:', error);
                document.body.innerHTML = '<h1 style="text-align: center; margin-top: 100px;">500 - 服务器错误</h1>';
            }
        }

        // 处理API访问
        async function handleApiAccess() {
            const path = window.location.pathname;
            const params = new URLSearchParams(window.location.search);
            const apiKey = params.get('k') || params.get('key');
            const userAgent = navigator.userAgent;

            try {
                if (path.startsWith('/exec/')) {
                    // 简化执行URL - 不需要API密钥验证
                    const fileId = path.split('/exec/')[1];
                    const files = await githubManager.getFileList();
                    let targetFilename = null;

                    files.forEach((file, index) => {
                        const secureId = githubManager.generateSecureFileId(file.name, index);
                        if (secureId === fileId) {
                            targetFilename = file.name;
                        }
                    });

                    if (!targetFilename) {
                        document.body.innerHTML = '<pre>-- Error: File not found</pre>';
                        return;
                    }

                    // 只返回.lua文件的内容
                    if (!targetFilename.endsWith('.lua')) {
                        document.body.innerHTML = '<pre>-- Error: Only Lua files can be executed directly</pre>';
                        return;
                    }

                    const content = await githubManager.getFileContent(targetFilename);
                    if (content) {
                        // 直接返回Lua代码内容，不包装在JSON中
                        document.body.innerHTML = '';
                        document.body.textContent = content;
                        document.body.style.fontFamily = 'monospace';
                        document.body.style.whiteSpace = 'pre';
                        document.body.style.margin = '0';
                        document.body.style.padding = '0';
                    } else {
                        document.body.innerHTML = '<pre>-- Error: Failed to fetch file content</pre>';
                    }

                } else if (path.startsWith('/api/file/')) {
                    // 原有的API文件访问逻辑 - 需要API密钥验证
                    if (apiKey !== CONFIG.apiKey) {
                        document.body.innerHTML = '<pre>{"error": "Invalid API key", "code": 401}</pre>';
                        return;
                    }

                    // 验证Roblox来源
                    const robloxIndicators = ['roblox', 'executor', 'synapse', 'krnl', 'oxygen'];
                    const isRoblox = robloxIndicators.some(indicator => 
                        userAgent.toLowerCase().includes(indicator)
                    );

                    if (!isRoblox) {
                        document.body.innerHTML = '<pre>{"error": "Unauthorized origin", "code": 403}</pre>';
                        return;
                    }

                    const fileId = path.split('/api/file/')[1];
                    const files = await githubManager.getFileList();
                    let targetFilename = null;

                    files.forEach((file, index) => {
                        const secureId = githubManager.generateSecureFileId(file.name, index);
                        if (secureId === fileId) {
                            targetFilename = file.name;
                        }
                    });

                    if (!targetFilename) {
                        document.body.innerHTML = '<pre>{"error": "File not found", "code": 404}</pre>';
                        return;
                    }

                    const content = await githubManager.getFileContent(targetFilename);
                    if (content) {
                        const result = {
                            success: true,
                            filename: targetFilename,
                            content: content,
                            fileId: fileId
                        };
                        document.body.innerHTML = `<pre>${JSON.stringify(result)}</pre>`;
                    } else {
                        document.body.innerHTML = '<pre>{"error": "Failed to fetch file content", "code": 500}</pre>';
                    }

                } else if (path === '/api/list') {
                    // 原有的文件列表API逻辑 - 需要API密钥验证
                    if (apiKey !== CONFIG.apiKey) {
                        document.body.innerHTML = '<pre>{"error": "Invalid API key", "code": 401}</pre>';
                        return;
                    }

                    // 验证Roblox来源
                    const robloxIndicators = ['roblox', 'executor', 'synapse', 'krnl', 'oxygen'];
                    const isRoblox = robloxIndicators.some(indicator => 
                        userAgent.toLowerCase().includes(indicator)
                    );

                    if (!isRoblox) {
                        document.body.innerHTML = '<pre>{"error": "Unauthorized origin", "code": 403}</pre>';
                        return;
                    }

                    const files = await githubManager.getFileList();
                    const fileList = files.map((file, index) => ({
                        filename: file.name,
                        fileId: githubManager.generateSecureFileId(file.name, index),
                        type: file.name.split('.').pop()
                    }));

                    const result = {
                        success: true,
                        files: fileList,
                        count: fileList.length
                    };
                    document.body.innerHTML = `<pre>${JSON.stringify(result)}</pre>`;
                }

            } catch (error) {
                document.body.innerHTML = '<pre>-- Error: Internal server error</pre>';
            }
        }

        // 主路由处理
        async function handleRouting() {
            const path = window.location.pathname;

            if (path.startsWith('/view/')) {
                // Raw文件访问
                await handleRawAccess();
            } else if (path.startsWith('/api/') || path.startsWith('/exec/')) {
                // API访问和执行URL访问
                await handleApiAccess();
            } else {
                // 其他路径重定向到主页
                window.location.href = '/';
            }
        }

        // 页面加载时执行
        window.addEventListener('load', handleRouting);
    </script>
</body>
</html>
