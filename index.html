<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yyds76 Repository</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <h2>Repository Access</h2>
            <p>Enter password to access repository files:</p>
            <input type="password" id="passwordInput" placeholder="Enter password">
            <button onclick="authenticate()">Login</button>
            <div id="loginError" class="error"></div>
        </div>
    </div>

    <div id="mainContent" class="hidden">
        <header>
            <h1>Yyds76 Repository Browser</h1>
            <button onclick="logout()" class="logout-btn">Logout</button>
        </header>
        
        <div class="container">
            <div class="breadcrumb" id="breadcrumb">
                <span onclick="navigateToPath('')">Repository</span>
            </div>
            
            <div class="file-list" id="fileList">
                <!-- Files will be loaded here -->
            </div>
        </div>
    </div>

    <div id="rawContent" class="hidden">
        <header>
            <h1>Raw File Content</h1>
            <button onclick="goBack()" class="back-btn">Back to Files</button>
        </header>
        <pre id="codeContent"></pre>
    </div>

    <script src="script.js"></script>
</body>
</html>
