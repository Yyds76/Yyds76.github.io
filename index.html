<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yyds76 代码存储库</title>
    <link rel="stylesheet" href="styles.css">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#667eea">
</head>
<body>
    <!-- 登录界面 -->
    <div id="loginContainer" class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>🔐 Yyds76 代码库</h1>
                <p>请输入访问密码</p>
            </div>
            <div class="login-form">
                <input type="password" id="passwordInput" placeholder="输入密码" autocomplete="current-password" />
                <button onclick="authenticate()" class="login-btn">
                    <span>🚀 进入系统</span>
                </button>
                <div id="loginError" class="error-message"></div>
            </div>
        </div>
    </div>

    <!-- 主界面 -->
    <div id="mainContainer" class="container hidden">
        <header>
            <h1>📁 Yyds76 代码存储库</h1>
            <div class="header-controls">
                <span id="userInfo">已登录</span>
                <button onclick="logout()" class="logout-btn">退出登录</button>
            </div>
        </header>

        <div class="content">
            <div class="sidebar">
                <h3>📂 文件列表</h3>
                <div id="fileList" class="file-list">
                    <!-- 文件列表将通过JavaScript动态生成 -->
                </div>
                <button onclick="addFile()" class="add-file-btn">+ 添加文件</button>
            </div>

            <div class="main-content">
                <div id="fileViewer" class="file-viewer">
                    <div class="welcome-message">
                        <h2>欢迎使用代码存储库</h2>
                        <p>选择左侧文件以查看内容</p>
                        <div class="api-info">
                            <h3>🔗 API 访问信息</h3>
                            <div class="api-details" id="apiDetails">
                                <p><strong>API Key:</strong> <code>yyds_steve_76</code></p>
                                <p><strong>Raw 访问:</strong> <code>/r/文件标识符</code></p>
                                <p><strong>执行访问:</strong> <code>/x/文件标识符</code></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Raw 模式界面 -->
    <div id="rawContainer" class="container hidden">
        <pre id="rawContent"></pre>
    </div>

    <!-- 错误页面 -->
    <div id="errorContainer" class="container hidden">
        <div class="error-page">
            <h1>❌ 错误</h1>
            <p id="errorContent">发生了错误</p>
            <button onclick="goHome()" class="home-btn">返回首页</button>
        </div>
    </div>

    <!-- 可执行内容页面 -->
    <div id="executableContainer" class="container hidden">
        <pre id="executableContent"></pre>
    </div>

    <script src="script.js"></script>
</body>
</html>
